<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Formulario sencillo</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .contenedor{
            background:white;
            padding:25px;
            border-radius:10px;
            width:300px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:8px;
            margin:6px 0;
        }

        button{
            width:100%;
            padding:8px;
            margin-top:6px;
            cursor:pointer;
        }

        .error{
            color:red;
            font-size:13px;
        }

        .datos{
            margin-top:12px;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="contenedor" id="caja">
    <h2>Registro</h2>

    <form id="formulario">

        <input type="text" id="nombre" placeholder="Nombre">
        <input type="email" id="correo" placeholder="Correo">
        <input type="number" id="edad" placeholder="Edad">

        <p class="error" id="mensaje"></p>

        <button type="submit">Enviar</button>
        <button type="button" onclick="borrarDatos()">Borrar</button>
        <button type="button" onclick="cambiarColor()">Cambiar color</button>
    </form>

    <div class="datos" id="resultado"></div>
</div>

<script>
const formulario = document.getElementById("formulario");
const mensaje = document.getElementById("mensaje");
const resultado = document.getElementById("resultado");
const caja = document.getElementById("caja");

formulario.addEventListener("submit", function(e){
    e.preventDefault(); // evita que se recargue la página

    const nombre = document.getElementById("nombre").value.trim();
    const correo = document.getElementById("correo").value.trim();
    const edad = document.getElementById("edad").value.trim();

    // VALIDACIÓN
    if(nombre === "" || correo === "" || edad === ""){
        mensaje.textContent = "⚠ Todos los campos son obligatorios";
        return;
    }

    mensaje.textContent = "";

    // Mostrar datos
    resultado.innerHTML = `
        <b>Datos ingresados:</b><br>
        Nombre: ${nombre}<br>
        Correo: ${correo}<br>
        Edad: ${edad}
    `;

    // Mostrar en consola
    console.log({nombre, correo, edad});
});


// BOTÓN BORRAR
function borrarDatos(){
    formulario.reset();
    resultado.innerHTML = "";
    mensaje.textContent = "";
}


// CAMBIO DINÁMICO DE COLOR
function cambiarColor(){
    const colores = ["#ffffff", "#dff9fb", "#ffeaa7", "#fab1a0", "#c7ecee"];
    const random = colores[Math.floor(Math.random()*colores.length)];
    caja.style.background = random;
}
</script>

</body>
</html>
